spring.application.name=SafarSetu-Test

# H2 DB Configurations
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Mail Config (Not Used)
spring.mail.host=in-v3.mailjet.com
spring.mail.port=587
spring.mail.username=e489cde40ad26a3d2205291065ea9619c8
spring.mail.password=your app password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

razorpay.key.id=test_rzp_id
razorpay.key.secret=test_rzp_secret
