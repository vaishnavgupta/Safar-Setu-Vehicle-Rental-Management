# Google Oauth
spring.security.oauth2.client.registration.google.client-id=test_google_client
spring.security.oauth2.client.registration.google.client-secret=test_google_secret
spring.security.oauth2.client.registration.google.scope=email,profile

# Github Oauth
spring.security.oauth2.client.registration.github.client-id=test_github_id
spring.security.oauth2.client.registration.github.client-secret=test_github_client
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.provider.github.user-name-attribute=id

# Cloudinary Configuration
